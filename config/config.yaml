# config.yaml
#
# Zentrale Konfigurationsdatei für dein Analyse- und Scanner-System.
#
# Inhalt:
# - allgemeine Programmeinstellungen
# - Datenquellen
# - SMA-Parameter
# - Divergenz-Erkennung
# - Donchian-Scanner
# - RSI-Scanner
# - Liquidity-Grab-Scanner mit 3-Stufen-Logik
#
# Hinweis:
# Diese Datei ist so geschrieben, dass sie direkt nutzbar ist
# und gleichzeitig die Bedeutung jeder Einstellung erklärt.


######################################################
# CHARTS SPEICHERN / AUSGEBEN
######################################################

save_chart_images: true
# Wenn true, speichert der Scanner die gefundenen Charts
# automatisch als PNG.

show_chart_windows: true
# Wenn true, werden Charts zusätzlich als Fenster geöffnet.
#
# false ist sinnvoll, wenn du vor allem Dateien speichern
# und später auswerten willst.

save_zoom_fraction: 0.3333
# Wie viel des letzten Chartbereichs zusätzlich als Zoom
# gespeichert werden soll.
#
# 0.3333 = letztes Drittel

save_zoom_min_bars: 30
# Mindestanzahl an Bars im Zoom-Chart.
#
# Falls das letzte Drittel zu klein wäre,
# bleiben mindestens 30 Bars sichtbar.

######################################################
# Allgemeine Settings
######################################################

settings:
  timeframe: D1
  # Standard-Zeitrahmen für die Analyse.
  #
  # Mögliche Werte:
  # H1 = 1 Stunde
  # H4 = 4 Stunden
  # D1 = Tageschart
  #
  # Dieser Wert ist der voreingestellte Standard.
  # In deinem Scanner kannst du den Timeframe später trotzdem
  # interaktiv auswählen.

  timeframe_choices: ["H1", "H4", "D1"]
  # Welche Timeframes im Auswahlmenü angeboten werden sollen.

  default_source: yfinance
  # Standard-Datenquelle.
  #
  # Mögliche Werte:
  # yfinance = Yahoo Finance
  # oanda    = OANDA API
  #
  # Für Aktien und viele Indizes ist yfinance praktisch.
  # Für Forex / CFD / intraday kann OANDA je nach Markt sinnvoll sein.

  markets_file: config/markets.yaml
  # Pfad zur Datei mit den Marktdefinitionen.
  #
  # Dort legst du fest, welche Märkte / Watchlists / Symbole
  # gescannt werden sollen.

SMA:
  langfristig: 200
  # Periode des langfristigen gleitenden Durchschnitts.
  #
  # Standard:
  # SMA200 wird oft als grober Trendfilter genutzt.

  kurzfristig: 20
  # Periode des kurzfristigen gleitenden Durchschnitts.
  #
  # Kann z. B. für Pullback-Analysen, Korrekturen oder
  # allgemeine Trendnähe verwendet werden.

oanda:
  access_token: 7110291164afb12ed43bb74b908183b3-2e13231fb42fe4080aa1eb291a9da12c # OANDA API-Zugangsschlüssel (privat halten!)
  account_id: 101-004-12489955-001 # Deine OANDA Konto-ID für API-Zugriffe (privat halten!)

divergence:
  rsi_period: 14
  # RSI-Periode für die Divergenzerkennung.
  #
  # Standard ist meist 14.

  fractal_periods: 4
  # Wie viele Kerzen links und rechts zur Fraktal-/Pivot-Erkennung
  # genutzt werden.
  #
  # Höher = stabilere, aber langsamere Pivot-Erkennung
  # Niedriger = sensibler, aber mehr Rauschen

  max_bars_diff: 12
  # Maximale Distanz zwischen zwei Divergenzpunkten in Bars.
  #
  # Verhindert, dass sehr weit auseinanderliegende Punkte
  # als zusammengehörige Divergenz gewertet werden.

auswertung:
  maximal_bars: 7
  # Wie viele der letzten Bars in bestimmten Auswertungen
  # berücksichtigt werden sollen.
  #
  # Praktisch für kompakte Zusammenfassungen oder Signalchecks
  # auf den jüngsten Kerzen.

donchian:
  period: 20
  # Periodenlänge des Donchian-Kanals.
  #
  # Standard:
  # 20 ist sehr gebräuchlich.

  warn_distance_percent: 2
  # Warnschwelle in Prozent.
  #
  # Beispiel:
  # Wenn der Kurs nur noch 2 % vom oberen oder unteren Donchian-Level
  # entfernt ist, kann der Scanner das als "nah dran" markieren.

rsi_scanner:
  period: 14
  # RSI-Periode des RSI-Scanners.

  lower: 30
  # Untere Schwelle.
  #
  # Typisch:
  # RSI <= 30 = eher überverkauft

  upper: 70
  # Obere Schwelle.
  #
  # Typisch:
  # RSI >= 70 = eher überkauft

  mode: last_bar
  # Scan-Modus.
  #
  # last_bar
  #   = nur der RSI der letzten Kerze wird betrachtet

  lookback_bars: 200
  # Wie viele Bars geladen werden, damit RSI sauber berechnet
  # und geprüft werden kann.

liquidity_grab:
  ######################################################
  # GRUNDLOGIK DES SCANNERS

  included_stages: [1] # später leicht umstellen auf: z.B. included_stages: [2, 3]
  show_runs: false
  # Wenn true, zeigt der Scanner auch Runs an.
  show_failed_grabs: false
  # Wenn true, zeigt der Scanner auch schwächere / unbestätigte
  # Grab-Kandidaten.
  # Für normale Nutzung meist besser false.

  
  # Der Scanner arbeitet mit 3 Stufen:
  #
  # Stufe 1 – Early Grab
  #   Sweep + Reclaim + erste Rejection + Kontext
  #
  # Stufe 2 – Follow-through
  #   Der Markt läuft nach dem Grab innerhalb weniger Bars
  #   sichtbar in die erwartete Richtung weiter
  #
  # Stufe 3 – MSS / CHOCH
  #   Nach Grab + Follow-through wird zusätzlich
  #   eine relevante Struktur gebrochen
  #
  # Ziel:
  # - Stufe 1 = Vorbereitung / Beobachtung
  # - Stufe 2 = Markt reagiert
  # - Stufe 3 = strukturell bestätigtes Setup
  ######################################################

  pivot_bars: 3
  # Wie streng Swing Highs / Swing Lows als Pivots erkannt werden.
  #
  # Wirkung:
  # - kleiner Wert = mehr Levels, mehr Signale, mehr Rauschen
  # - größerer Wert = weniger, aber stärkere Swings
  #
  # Gute Werte:
  # 2 = aggressiv
  # 3 = guter Standard
  # 4-5 = strenger

  lookback_bars: 260
  # Wie viele Bars insgesamt für den Liquidity-Grab-Scanner
  # geladen und analysiert werden.
  #
  # Wirkung:
  # mehr Bars = mehr Struktur / mehr historische Levels
  #
  # Gute Bereiche:
  # H1: 200-400
  # H4: 180-320
  # D1: 150-300

  scan_recent_bars: 8
  # Nur Signale aus den letzten X Bars werden ausgegeben.
  #
  # So zeigt der Scanner frische Setups statt alter Situationen.
  #
  # Gute Werte:
  # 5-10
  # 8 = guter Standard

  max_reference_age_bars: 120
  # So alt darf ein Referenzlevel maximal sein.
  #
  # Sehr alte Levels verlieren oft an Relevanz.
  #
  # Wirkung:
  # - kleiner = frischere Levels
  # - größer = mehr Historie, aber oft mehr Unschärfe
  #
  # Zusätzlich prüft der Code, ob ein Level bereits früher
  # verletzt wurde. Solche "verbrauchten" Levels werden verworfen.

  max_levels_per_side: 12
  # Maximale Anzahl aktiver Levels je Richtung.
  #
  # buy_side = alte Hochs über dem Markt
  # sell_side = alte Tiefs unter dem Markt
  #
  # Höher = mehr Kontext, aber unübersichtlicher
  # Niedriger = fokussierter

  ######################################################
  # EQUAL HIGHS / EQUAL LOWS / LIQUIDITY POOLS
  ######################################################

  use_equal_levels: true
  # Ob nahe Hochs / Tiefs zu gemeinsamen Liquidity-Pools
  # zusammengefasst werden sollen.
  #
  # Für SMC / ICT meist sinnvoll.

  equal_level_threshold_percent: 0.08
  # Abstand in Prozent, innerhalb dessen Hochs/Tiefs noch
  # als "equal" gelten.
  #
  # Richtwerte:
  # 0.05 = streng
  # 0.08 = guter Standard
  # 0.10 = lockerer

  equal_level_recent_weight: 0.70
  # Gewichtet neuere Pivots innerhalb eines Equal-Pools stärker.
  #
  # Dadurch bleibt der Pool näher an der aktuellen Marktstruktur.

  ######################################################
  # SWEEP / GRAB-DEFINITION
  ######################################################

  min_sweep_percent: 0.03
  # Mindestgröße des Sweeps über / unter dem Level in Prozent.
  #
  # Zu klein = viele Mini-Sweeps / Rauschen
  #
  # Richtwerte:
  # 0.03 = aggressiv
  # 0.05 = guter Standard
  # 0.08+ = strenger

  max_sweep_percent: 1.20
  # Maximale Sweep-Größe in Prozent.
  #
  # Wenn der Markt viel zu weit durchläuft, ist es oft eher
  # ein Run / Breakout als ein sauberer Grab.

  reclaim_rule: close_back_inside
  # Regel, wann ein Sweep als reclaimt gilt.
  #
  # Mögliche Werte:
  # close_back_inside = Schlusskurs wieder innerhalb
  # body_back_inside  = ganzer Kerzenkörper wieder innerhalb
  #
  # close_back_inside = etwas lockerer
  # body_back_inside  = strenger

  close_position_threshold: 0.45
  # Bewertet, wie stark die Signal-Kerze in die gewünschte
  # Richtung schließt.
  #
  # Höher = mehr Fokus auf starke Schlusslage.

  ######################################################
  # SIGNAL-QUALITÄT / REJECTION
  ######################################################

  require_opposite_candle_color: false
  # Optionaler Kerzenfarben-Filter.
  #
  # bullish Grab -> bevorzugt bullishe Candle
  # bearish Grab -> bevorzugt bearishe Candle
  #
  # false = flexibler
  # true  = strenger

  use_wick_filter: true
  # Wenn true, muss die relevante Sweep-Lunte eine Mindestgröße haben.
  #
  # Das macht sichtbare Rejection zur Pflicht.

  min_wick_ratio: 0.35
  # Mindestanteil der relevanten Lunte an der gesamten Candle-Range.
  #
  # Beispiel:
  # 0.35 = Lunte muss mindestens 35 % der Candle ausmachen

  wick_score_weight: 10.0
  # Wie stark eine gute Wick-Ratio im Score zusätzlich belohnt wird.

  strong_close_threshold: 0.70
  # Ab welchem Wert die Schlusslage als "stark" gilt.

  strong_close_score_bonus: 10.0
  # Bonuspunkte für starke Schlusslage in Signalrichtung.

  ######################################################
  # BASISBESTÄTIGUNG FÜR STUFE 1
  ######################################################

  confirmation_mode: "strong_reclaim"
  # Zusätzliche Bestätigungslogik für das Grundsignal.
  #
  # Mögliche Werte:
  # none
  # reclaim_only
  # strong_reclaim
  # structure_break
  #
  # strong_reclaim ist für deinen Scanner gut,
  # weil Stufe 1 schon eine gewisse Qualität haben soll.

  confirmation_lookahead_bars: 3
  # Nur relevant, wenn confirmation_mode = structure_break.
  #
  # Gibt an, wie viele Folgekerzen für diese Bestätigung
  # Zeit gelassen wird.

  ######################################################
  # TREND / MARKTSTRUKTUR / BIAS
  ######################################################

  trend_filter: "structure_bias"
  # Mögliche Werte:
  # none
  # sma200
  # structure_bias
  #
  # structure_bias = Trendbewertung über Struktur / Pivots
  # und ist für deinen Scanner sehr passend.

  trend_sma_period: 200
  # Nur relevant, wenn trend_filter = sma200.

  trend_pivot_lookback: 6
  # Wie viele der letzten Pivots für die Trend-/Bias-Erkennung
  # betrachtet werden.
  #
  # kleiner = sensibler
  # größer = stabiler

  range_score_penalty: 15
  # Strafabzug, wenn das Setup in einer Range liegt.

  counter_trend_score_penalty: 30
  # Strafabzug, wenn das Signal gegen die erkannte Marktstruktur läuft.

  skip_counter_trend_signals: false
  # true  = Counter-Trend-Signale komplett ausblenden
  # false = noch anzeigen, aber abwerten

  skip_range_signals: false
  # true  = Range-Signale komplett ausblenden
  # false = noch anzeigen, aber abwerten

  ######################################################
  # SCORE / AUSGABE
  ######################################################

  score_threshold: 58
  # Mindest-Score, damit ein Signal überhaupt ausgegeben wird.
  #
  # Orientierung:
  # 50-60 = viele Signale
  # 60-75 = guter Bereich
  # 80+   = sehr streng

  ######################################################
  # STUFEN-LOGIK
  ######################################################

  stage_mode: "highest_only"
  # Ergebnislogik pro Symbol.
  #
  # highest_only
  #   = pro Symbol zählt nur die höchste aktuell erreichte Stufe
  #
  # Das passt gut zu deinem Workflow:
  # Du willst direkt sehen, wie weit ein Muster schon entwickelt ist.

  ######################################################
  # STUFE 2 – FOLLOW-THROUGH
  ######################################################

  # follow_through_lookahead_bars:
  # Wird im Code automatisch je nach Timeframe gesetzt:
  #
  # H1 = 6 Bars
  # H4 = 4 Bars
  # D1 = 3 Bars
  #
  # Bedeutung:
  # So viele Folgekerzen bekommt ein Grab Zeit,
  # um sichtbar weiterzulaufen.
  #
  # Nur setzen, wenn du die automatische Logik bewusst überschreiben willst.

  follow_through_use_close_break: true
  # true:
  #   Schlusskurs-Bruch der Signal-Kerze nötig
  #
  # false:
  #   Wick-/High-/Low-Bruch reicht
  #
  # true = sauberer und strenger

  follow_through_min_move_percent: 0.0
  # Optionaler Mindestweg in Prozent nach dem Grab,
  # damit Stufe 2 gilt.
  #
  # 0.0 = deaktiviert
  #
  # Später könntest du hier z. B. 0.10 testen,
  # wenn dir Mini-Follow-throughs noch zu schwach sind.

  ######################################################
  # STUFE 3 – MSS / CHOCH
  ######################################################

  # mss_lookahead_bars:
  # Wird im Code automatisch je nach Timeframe gesetzt:
  #
  # H1 = 12 Bars
  # H4 = 8 Bars
  # D1 = 6 Bars
  #
  # Bedeutung:
  # So viele Folgekerzen bekommt das Setup Zeit,
  # nach Stufe 2 zusätzlich noch eine relevante Struktur zu brechen.
  #
  # Nur setzen, wenn du die Auto-Logik bewusst überschreiben willst.

  mss_use_close_break: true
  # true:
  #   Schlusskurs über/unter dem relevanten Pivot-Level nötig
  #
  # false:
  #   Wick über/unter dem Pivot-Level reicht
  #
  # true = robuster und sauberer

  stage2_score_bonus: 12.0
  # Zusatzpunkte im Score, wenn ein Setup Stufe 2 erreicht.
  #
  # Hintergrund:
  # Der Markt hat nach dem Grab tatsächlich reagiert.

  stage3_score_bonus: 18.0
  # Zusatzpunkte im Score, wenn ein Setup Stufe 3 erreicht.
  #
  # Hintergrund:
  # MSS / CHOCH ist die stärkste Bestätigung in dieser Phase.

  ######################################################
  # OVERLAYS / ZUSATZMUSTER IM CHART
  ######################################################

  show_fvg: true
  # Zeigt Fair Value Gaps dezent im Chart an.

  show_engulfing: true
  # Zeigt Engulfing-Muster dezent im Chart an.

  max_fvg_boxes: 4
  # Maximale Anzahl der zuletzt gefundenen FVGs pro Chart.

  max_engulfings: 6
  # Maximale Anzahl der zuletzt gefundenen Engulfings pro Chart.

  fvg_extend_bars: 5
  # Wie weit eine FVG-Box nach rechts verlängert wird.

  min_fvg_gap_percent: 0.03
  # Mindestgröße eines FVG in Prozent.
  #
  # 0.03 ist ein guter Startwert.

  fvg_alpha: 0.08
  # Transparenz der FVG-Boxen.
  #
  # kleiner = dezenter

  engulfing_alpha: 0.55
  # Sichtbarkeit der Engulfing-Markierungen.

###############################################
### Ergebnis-Erklärung (Liquidity Grab Scanner)
#
# Jede Zeile im Ergebnis enthält die wichtigsten Infos zum erkannten Setup:
#
# Beispiel:
# Score=117.56 | Sweep=0.569% | Level=37.34750
#
# Bedeutung:

# Score:
# Bewertet die Qualität des Signals (je höher, desto besser).
# Der Score setzt sich aus mehreren Faktoren zusammen:
# - Reclaim (wurde das Level sauber zurückerobert?)
# - Confirmation (gibt es eine Bestätigung?)
# - Equal High/Low (Liquiditätspool vorhanden?)
# - Anzahl der Touches (wie oft wurde das Level getestet?)
# - Alter des Levels (frischer = besser)
# - Sweep-Größe (zu klein oder zu groß = schlechter)
# - Schlusslage der Candle (starkes Close = besser)
#
# Orientierung:
# 50–70  = durchschnittlich
# 70–90  = gut
# 90–110 = sehr gut
# 110+   = sehr starkes Setup

# Sweep:
# Zeigt, wie weit der Markt das Level überschritten hat (in Prozent).
# Das ist der eigentliche "Liquidity Grab".
#
# Interpretation:
# <0.03%   = meist zu klein (Rauschen)
# 0.05–0.3 = okay
# 0.3–0.8  = sehr gut (typischer Stop-Hunt)
# >1.0     = eher Run / Breakout als Grab
#
# Ziel:
# Ein sauberer Sweep holt Liquidität, ohne dass der Markt komplett durchläuft.

# Level:
# Das Preisniveau, an dem die Liquidität lag.
# Meist:
# - altes Hoch → buy-side liquidity (Stops über Hoch)
# - altes Tief → sell-side liquidity (Stops unter Tief)
#
# Typischer Ablauf:
# 1. Markt läuft zum Level
# 2. überschreitet es (Sweep)
# 3. holt Liquidität (Stops)
# 4. kehrt zurück (Grab)

# Wichtiger Hinweis:
# Der Scanner gibt KEINE direkten Trades vor.
# Er zeigt nur mögliche Bereiche, in denen Liquidität geholt wurde.
# Die finale Bewertung (Trade oder nicht) liegt immer beim Nutzer.
